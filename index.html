<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoPulse • Real-Time Alerts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .heading-font { font-family: 'Space Grotesk', sans-serif; }
        .table-row:hover { background-color: #1a1a1a; }
        .live-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .error-box { animation: shake 0.4s ease; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <nav class="bg-black border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center text-black font-bold text-2xl">₿</div>
                <h1 class="heading-font text-3xl">CryptoPulse</h1>
                <span class="text-emerald-400 text-sm px-3 py-1 bg-emerald-500/10 rounded-3xl border border-emerald-500/30">LIVE</span>
            </div>
            <div class="flex items-center gap-x-6">
                <div class="flex items-center gap-x-2 bg-zinc-900 px-4 h-9 rounded-3xl border border-zinc-700">
                    <div class="w-2 h-2 bg-emerald-400 rounded-full live-dot"></div>
                    <span id="last-updated">Ready</span>
                </div>
                <button onclick="testConnection()" 
                        class="flex items-center gap-x-2 bg-zinc-800 hover:bg-zinc-700 px-5 h-10 rounded-3xl text-sm font-medium">
                    <i class="fa-solid fa-plug"></i> Test API
                </button>
                <button onclick="refreshData()" 
                        class="flex items-center gap-x-2 bg-emerald-500 hover:bg-emerald-400 text-black px-6 h-10 rounded-3xl font-medium">
                    <i class="fa-solid fa-arrows-rotate"></i> Refresh All Data
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-8 py-8">

        <!-- ERROR BANNER -->
        <div id="error-banner" class="hidden bg-red-500/10 border border-red-500 text-red-400 rounded-3xl p-6 mb-8 flex items-center gap-6 error-box">
            <i class="fa-solid fa-triangle-exclamation text-4xl flex-shrink-0"></i>
            <div class="flex-1">
                <div class="font-semibold text-lg">Can't fetch coins right now</div>
                <p id="error-details" class="text-sm mt-1"></p>
                <div class="text-xs mt-4 flex gap-4">
                    <button onclick="refreshData()" class="underline hover:text-white">Try again</button>
                    <button onclick="hideError()" class="underline hover:text-white">Dismiss</button>
                    <a href="https://status.coingecko.com/" target="_blank" class="underline hover:text-white">Check CoinGecko Status →</a>
                </div>
            </div>
        </div>

        <div id="status" class="mb-6 bg-zinc-900 border border-zinc-700 rounded-3xl p-6 text-center">
            <i id="status-icon" class="fa-solid fa-spinner animate-spin text-emerald-400 text-2xl"></i>
            <p id="status-text" class="mt-3 text-zinc-300">Testing connection to CoinGecko...</p>
        </div>

        <!-- MAIN TABLE -->
        <div class="bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800">
            <div class="p-6 border-b border-zinc-800 flex items-center justify-between">
                <h2 class="text-2xl font-semibold heading-font">Top 1000 Cryptocurrencies (Live)</h2>
                <input id="search-input" 
                       type="text" 
                       placeholder="Search coin name or symbol..." 
                       onkeyup="if(event.key==='Enter') filterCoins()"
                       class="bg-zinc-800 border border-zinc-700 focus:border-emerald-400 rounded-3xl px-6 py-3 w-96 outline-none text-sm">
            </div>
            <table class="w-full">
                <thead>
                    <tr class="text-xs uppercase text-zinc-400 border-b border-zinc-800">
                        <th class="py-5 px-8 text-left">#</th>
                        <th class="py-5 px-4 text-left">Coin</th>
                        <th class="py-5 px-8 text-right">Price (USD)</th>
                        <th class="py-5 px-8 text-right">24h %</th>
                        <th class="py-5 px-8 text-right">Market Cap</th>
                        <th class="py-5 px-8 w-40"></th>
                    </tr>
                </thead>
                <tbody id="coins-body" class="divide-y divide-zinc-800 text-sm"></tbody>
            </table>
        </div>

        <div class="mt-8 text-center text-xs text-zinc-500 flex flex-col items-center gap-y-1">
            <div>Data from <a href="https://www.coingecko.com/" target="_blank" class="underline">CoinGecko</a></div>
            <div class="text-emerald-400">Your dashboard is hosted on GitHub Pages • yasir ali</div>
            <div id="debug-info" class="text-[10px] text-zinc-600"></div>
        </div>
    </div>

    <script>
        let allCoins = [];
        let filtered = [];

        // Show error banner with clear message
        function showError(message, details = "") {
            const banner = document.getElementById("error-banner");
            const detailsEl = document.getElementById("error-details");
            detailsEl.innerHTML = `<strong>\( {message}</strong><br> \){details}`;
            banner.classList.remove("hidden");
            console.error("CryptoPulse Error:", message, details);
        }

        function hideError() {
            document.getElementById("error-banner").classList.add("hidden");
        }

        // Test single connection first (Bitcoin only) – very reliable
        async function testConnection() {
            const statusEl = document.getElementById("status");
            const statusText = document.getElementById("status-text");
            const statusIcon = document.getElementById("status-icon");
            
            statusEl.classList.remove("hidden");
            statusText.textContent = "Testing CoinGecko connection...";
            statusIcon.className = "fa-solid fa-spinner animate-spin text-emerald-400 text-2xl";

            try {
                const res = await fetch("https://api.coingecko.com/api/v3/ping", { 
                    method: "GET",
                    headers: { "Accept": "application/json" }
                });
                
                if (res.ok) {
                    statusText.innerHTML = `✅ <span class="text-emerald-400">Connection successful!</span><br>CoinGecko is reachable.`;
                    statusIcon.className = "fa-solid fa-check-circle text-emerald-400 text-2xl";
                    setTimeout(() => { statusEl.classList.add("hidden"); }, 2000);
                    return true;
                } else {
                    throw new Error(`HTTP ${res.status}`);
                }
            } catch (err) {
                statusText.innerHTML = `❌ Connection failed<br><span class="text-red-400 text-sm">${err.message}</span>`;
                statusIcon.className = "fa-solid fa-triangle-exclamation text-red-400 text-2xl";
                showError("API connection test failed", err.message + "<br><br>Possible causes:<br>• Your internet / VPN<br>• Browser ad-blocker / privacy extension<br>• Temporary CoinGecko rate limit<br>• GitHub Pages / browser CORS issue");
                return false;
            }
        }

        async function fetchCoins() {
            hideError();
            const statusEl = document.getElementById("status");
            const statusText = document.getElementById("status-text");
            const statusIcon = document.getElementById("status-icon");
            
            statusEl.classList.remove("hidden");
            statusText.textContent = "Fetching top 1000 coins... (this takes \~8 seconds)";
            statusIcon.className = "fa-solid fa-spinner animate-spin text-emerald-400 text-2xl";

            allCoins = [];
            let successPages = 0;

            try {
                // Fetch sequentially with delay to respect rate limits (30 calls/min free tier)
                for (let page = 1; page <= 4; page++) {
                    const res = await fetch(
                        `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=${page}&price_change_percentage=24h`,
                        { headers: { "Accept": "application/json" } }
                    );
                    
                    if (!res.ok) {
                        if (res.status === 429) throw new Error("RATE_LIMIT – CoinGecko is limiting requests. Wait 30 seconds.");
                        throw new Error(`HTTP ${res.status}`);
                    }
                    
                    const data = await res.json();
                    allCoins = allCoins.concat(data);
                    successPages++;
                    statusText.textContent = `Loaded \( {allCoins.length} coins ( \){successPages}/4 pages)...`;
                    await new Promise(r => setTimeout(r, 450)); // safe delay
                }

                filtered = allCoins;
                renderTable();
                document.getElementById("last-updated").innerHTML = `✅ Updated just now <span class="text-emerald-400 text-xs">(1000 coins)</span>`;
                statusEl.classList.add("hidden");
                console.log(`✅ Loaded ${allCoins.length} coins successfully`);

            } catch (err) {
                console.error(err);
                statusEl.classList.add("hidden");
                showError("Failed to fetch coins", 
                    err.message + "<br><br><strong>Quick fixes:</strong><br>" +
                    "1. Click <strong>Test API</strong> button above<br>" +
                    "2. Wait 30 seconds and try Refresh again<br>" +
                    "3. Disable any ad-blocker / VPN temporarily<br>" +
                    "4. Open browser console (F12) and tell me what error you see"
                );
            }
        }

        function renderTable() {
            const tbody = document.getElementById("coins-body");
            let html = "";

            if (filtered.length === 0) {
                html = `<tr><td colspan="6" class="text-center py-12 text-zinc-400">No coins match your search</td></tr>`;
            } else {
                // Show first 100 for fast rendering
                filtered.slice(0, 100).forEach((coin, i) => {
                    const change = coin.price_change_percentage_24h || 0;
                    html += `
                    <tr class="table-row">
                        <td class="py-5 px-8 font-medium text-zinc-400">${i+1}</td>
                        <td class="py-5 px-4">
                            <div class="flex items-center gap-x-3">
                                <img src="\( {coin.image}" alt=" \){coin.name}" class="w-8 h-8 rounded-full" onerror="this.src='https://via.placeholder.com/32?text=?'">
                                <div>
                                    <div class="font-semibold">${coin.name}</div>
                                    <div class="text-xs text-zinc-400">${coin.symbol.toUpperCase()}</div>
                                </div>
                            </div>
                        </td>
                        <td class="py-5 px-8 text-right font-medium">\[ {coin.current_price ? coin.current_price.toLocaleString(undefined, {minimumFractionDigits: coin.current_price < 1 ? 6 : 2}) : '—'}</td>
                        <td class="py-5 px-8 text-right ${change >= 0 ? 'text-emerald-400' : 'text-red-400'} font-medium">
                            ${change >= 0 ? '↑' : '↓'} ${Math.abs(change).toFixed(2)}%
                        </td>
                        <td class="py-5 px-8 text-right font-medium"> \]{(coin.market_cap ? (coin.market_cap / 1e9).toFixed(1) : '—')}B</td>
                        <td class="py-5 px-8">
                            <button onclick="setAlert('\( {coin.name}', ' \){coin.symbol}', ${coin.current_price || 0})" 
                                    class="text-xs bg-emerald-400/10 hover:bg-emerald-400 hover:text-black text-emerald-400 px-5 py-2 rounded-3xl transition-all">
                                <i class="fa-solid fa-bell"></i> Set Alert
                            </button>
                        </td>
                    </tr>`;
                });
            }
            tbody.innerHTML = html;
        }

        function filterCoins() {
            const term = document.getElementById("search-input").value.toLowerCase().trim();
            filtered = term ? allCoins.filter(c => 
                c.name.toLowerCase().includes(term) || c.symbol.toLowerCase().includes(term)
            ) : allCoins;
            renderTable();
        }

        function refreshData() {
            document.getElementById("last-updated").textContent = "Refreshing...";
            fetchCoins();
        }

        function setAlert(name, symbol, currentPrice) {
            const target = prompt(`💰 Set alert for \( {name} ( \){symbol.toUpperCase()})\nCurrent price: \[ {currentPrice}\n\nTarget price (USD):`, currentPrice.toFixed(2));
            if (target && !isNaN(parseFloat(target))) {
                alert(`✅ Alert created!\n\n${symbol.toUpperCase()} will trigger when it hits \]{parseFloat(target)}.\n\n(Real email alerts need EmailJS – let me know if you want that added next)`);
            }
        }

        // Auto-start with connection test
        window.onload = async () => {
            document.getElementById("debug-info").innerHTML = `GitHub Pages • ${navigator.userAgent.includes("Chrome") ? "Chrome" : "Browser"} • Pakistan`;
            const connected = await testConnection();
            if (connected) {
                fetchCoins();
            }
        };
    </script>
</body>
</html>
