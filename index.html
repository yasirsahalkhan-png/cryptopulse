<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoPulse • Real-Time Alerts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .heading-font { font-family: 'Space Grotesk', sans-serif; }
        .table-row:hover { background-color: #1a1a1a; }
        .live-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <nav class="bg-black border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center text-black font-bold text-2xl">₿</div>
                <h1 class="heading-font text-3xl">CryptoPulse</h1>
                <span class="text-emerald-400 text-sm px-3 py-1 bg-emerald-500/10 rounded-3xl border border-emerald-500/30">LIVE • CryptoCompare</span>
            </div>
            <div class="flex items-center gap-x-4">
                <div class="flex items-center gap-x-2 bg-zinc-900 px-4 h-9 rounded-3xl border border-zinc-700 text-sm">
                    <div class="w-2 h-2 bg-emerald-400 rounded-full live-dot"></div>
                    <span id="last-updated">Ready</span>
                </div>
                <button onclick="refreshData()" 
                        class="flex items-center gap-x-2 bg-emerald-500 hover:bg-emerald-400 text-black px-6 h-10 rounded-3xl font-medium">
                    <i class="fa-solid fa-arrows-rotate"></i> Refresh
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-8 py-8">
        
        <!-- Status / Error area -->
        <div id="status" class="mb-6 bg-zinc-900 border border-zinc-700 rounded-3xl p-6 text-center hidden">
            <i id="status-icon" class="fa-solid fa-spinner animate-spin text-emerald-400 text-2xl"></i>
            <p id="status-text" class="mt-3 text-zinc-300"></p>
            <div id="error-debug" class="mt-4 text-xs text-left max-w-md mx-auto bg-black/50 p-3 rounded-2xl hidden"></div>
        </div>

        <div class="bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800">
            <div class="p-6 border-b border-zinc-800 flex items-center justify-between">
                <h2 class="text-2xl font-semibold heading-font">Top 1000 Cryptocurrencies (Live)</h2>
                <input id="search-input" 
                       type="text" 
                       placeholder="Search coin name or symbol..." 
                       onkeyup="filterCoins()"
                       class="bg-zinc-800 border border-zinc-700 focus:border-emerald-400 rounded-3xl px-6 py-3 w-96 outline-none text-sm">
            </div>
            <table class="w-full">
                <thead>
                    <tr class="text-xs uppercase text-zinc-400 border-b border-zinc-800">
                        <th class="py-5 px-8 text-left">#</th>
                        <th class="py-5 px-4 text-left">Coin</th>
                        <th class="py-5 px-8 text-right">Price (USD)</th>
                        <th class="py-5 px-8 text-right">24h %</th>
                        <th class="py-5 px-8 text-right">Market Cap</th>
                        <th class="py-5 px-8 w-40"></th>
                    </tr>
                </thead>
                <tbody id="coins-body" class="divide-y divide-zinc-800 text-sm"></tbody>
            </table>
        </div>

        <div class="mt-8 text-center text-xs text-zinc-500">
            Data from CryptoCompare • Fixed error handling added
        </div>
    </div>

    <script>
        let allCoins = [];
        let filtered = [];

        async function fetchCoins() {
            const status = document.getElementById("status");
            const text = document.getElementById("status-text");
            const icon = document.getElementById("status-icon");
            const debug = document.getElementById("error-debug");
            
            status.classList.remove("hidden");
            debug.classList.add("hidden");
            text.textContent = "Fetching top 1000 coins from CryptoCompare...";
            icon.className = "fa-solid fa-spinner animate-spin text-emerald-400 text-2xl";

            try {
                const res = await fetch(
                    "https://min-api.cryptocompare.com/data/top/mktcapfull?limit=1000&tsym=USD"
                );

                const json = await res.json();
                
                // === FIXED ERROR HANDLING ===
                console.log("🔍 Full API response:", json);   // visible in F12 Console

                if (json.Response === "Error") {
                    throw new Error(json.Message || "API returned error");
                }

                if (!json.Data || !Array.isArray(json.Data)) {
                    throw new Error("Unexpected response format (Data is not an array)");
                }

                // Success path
                allCoins = json.Data.map(item => {
                    const raw = item.RAW ? item.RAW.USD : {};
                    return {
                        name: item.CoinInfo.FullName || item.CoinInfo.Name,
                        symbol: item.CoinInfo.Name,
                        image: `https://www.cryptocompare.com${item.CoinInfo.ImageUrl || ''}`,
                        price: raw.PRICE || 0,
                        change24h: raw.CHANGEPCT24HOUR || 0,
                        marketCap: raw.MKTCAP || 0
                    };
                });

                filtered = allCoins;
                renderTable();
                document.getElementById("last-updated").textContent = "Updated just now";
                status.classList.add("hidden");
                console.log(`✅ Loaded ${allCoins.length} coins successfully`);

            } catch (e) {
                console.error("Fetch error:", e);
                icon.className = "fa-solid fa-triangle-exclamation text-red-400 text-2xl";
                text.innerHTML = `❌ ${e.message}`;
                
                // Show debug info
                debug.innerHTML = `
                    <strong>Debug info (copy this to me):</strong><br>
                    ${e.message}<br>
                    Open F12 → Console tab and tell me what you see there.
                `;
                debug.classList.remove("hidden");
            }
        }

        function renderTable() {
            const tbody = document.getElementById("coins-body");
            let html = "";

            const display = filtered.slice(0, 100);

            if (display.length === 0) {
                html = `<tr><td colspan="6" class="py-12 text-center text-zinc-400">No coins found</td></tr>`;
            } else {
                display.forEach((coin, i) => {
                    const change = coin.change24h || 0;
                    html += `
                    <tr class="table-row">
                        <td class="py-5 px-8 font-medium text-zinc-400">${i+1}</td>
                        <td class="py-5 px-4">
                            <div class="flex items-center gap-x-3">
                                <img src="\( {coin.image}" alt=" \){coin.name}" class="w-8 h-8 rounded-full" onerror="this.src='https://via.placeholder.com/32?text=?'">
                                <div>
                                    <div class="font-semibold">${coin.name}</div>
                                    <div class="text-xs text-zinc-400">${coin.symbol}</div>
                                </div>
                            </div>
                        </td>
                        <td class="py-5 px-8 text-right font-medium">\[ {coin.price.toLocaleString(undefined, {minimumFractionDigits: coin.price < 1 ? 6 : 2})}</td>
                        <td class="py-5 px-8 text-right ${change >= 0 ? 'text-emerald-400' : 'text-red-400'} font-medium">
                            ${change >= 0 ? '↑' : '↓'} ${Math.abs(change).toFixed(2)}%
                        </td>
                        <td class="py-5 px-8 text-right font-medium"> \]{(coin.marketCap / 1000000000).toFixed(1)}B</td>
                        <td class="py-5 px-8">
                            <button onclick="setAlert('\( {coin.name}', ' \){coin.symbol}', ${coin.price})" 
                                    class="text-xs bg-emerald-400/10 hover:bg-emerald-400 hover:text-black text-emerald-400 px-5 py-2 rounded-3xl transition-all">
                                <i class="fa-solid fa-bell"></i> Set Alert
                            </button>
                        </td>
                    </tr>`;
                });
            }
            tbody.innerHTML = html;
        }

        function filterCoins() {
            const term = document.getElementById("search-input").value.toLowerCase().trim();
            filtered = term 
                ? allCoins.filter(c => c.name.toLowerCase().includes(term) || c.symbol.toLowerCase().includes(term))
                : allCoins;
            renderTable();
        }

        function refreshData() {
            document.getElementById("last-updated").textContent = "Refreshing...";
            fetchCoins();
        }

        function setAlert(name, symbol, currentPrice) {
            const target = prompt(`💰 Set alert for \( {name} ( \){symbol})\nCurrent price: \[ {currentPrice}\n\nTarget price (USD):`, currentPrice.toFixed(2));
            if (target && !isNaN(target)) {
                alert(`✅ Alert created!\n\n${symbol} will trigger when it reaches \]{parseFloat(target)}.\n\n(Email alerts can be added in the next version)`);
            }
        }

        // Start
        window.onload = fetchCoins;
    </script>
</body>
</html>
