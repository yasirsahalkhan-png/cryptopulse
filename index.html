<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoPulse • Real-Time Alerts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .heading-font { font-family: 'Space Grotesk', sans-serif; }
        .table-row:hover { background-color: #1a1a1a; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <nav class="bg-black border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center text-black font-bold text-2xl">₿</div>
                <h1 class="heading-font text-3xl">CryptoPulse</h1>
                <span class="text-emerald-400 text-sm px-3 py-1 bg-emerald-500/10 rounded-3xl border border-emerald-500/30">DEMO MODE</span>
            </div>
            <button onclick="refreshMock()" class="flex items-center gap-x-2 bg-emerald-500 hover:bg-emerald-400 text-black px-6 h-10 rounded-3xl font-medium">
                <i class="fa-solid fa-arrows-rotate"></i> Refresh Demo
            </button>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-8 py-8">
        <div class="bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800">
            <div class="p-6 border-b border-zinc-800 flex justify-between items-center">
                <h2 class="text-2xl font-semibold heading-font">Top 1000 Cryptocurrencies (Demo Data)</h2>
                <input id="search" type="text" placeholder="Search coin..." 
                       onkeyup="filterTable()" class="bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-3 w-80 outline-none">
            </div>
            <table class="w-full">
                <thead>
                    <tr class="text-xs uppercase text-zinc-400 border-b border-zinc-800">
                        <th class="py-5 px-8 text-left">#</th>
                        <th class="py-5 px-4 text-left">Coin</th>
                        <th class="py-5 px-8 text-right">Price (USD)</th>
                        <th class="py-5 px-8 text-right">24h %</th>
                        <th class="py-5 px-8 text-right">Market Cap</th>
                        <th class="py-5 px-8 w-40"></th>
                    </tr>
                </thead>
                <tbody id="tbody" class="divide-y divide-zinc-800 text-sm"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Mock data - always works
        let coins = [
            {rank:1, name:"Bitcoin", symbol:"BTC", price:65234.45, change:2.34, cap:"1.28T"},
            {rank:2, name:"Ethereum", symbol:"ETH", price:2845.67, change:-1.12, cap:"342B"},
            {rank:3, name:"Tether", symbol:"USDT", price:1.00, change:0.01, cap:"112B"},
            {rank:4, name:"BNB", symbol:"BNB", price:578.90, change:3.45, cap:"84B"},
            {rank:5, name:"Solana", symbol:"SOL", price:148.23, change:4.67, cap:"68B"},
            // ... more mock coins
        ];

        for(let i=6; i<=100; i++){
            coins.push({
                rank: i,
                name: ["Ripple","Cardano","Dogecoin","TRON","Avalanche"][(i-6)%5],
                symbol: ["XRP","ADA","DOGE","TRX","AVAX"][(i-6)%5],
                price: Math.random()*1000,
                change: (Math.random()*10 - 5),
                cap: (Math.random()*50).toFixed(1)+"B"
            });
        }

        function renderTable(filteredCoins) {
            const tbody = document.getElementById("tbody");
            tbody.innerHTML = filteredCoins.map(coin => `
                <tr class="table-row">
                    <td class="py-5 px-8 text-zinc-400">${coin.rank}</td>
                    <td class="py-5 px-4">
                        <div class="flex items-center gap-x-3">
                            <div class="w-8 h-8 bg-gradient-to-br from-yellow-400 to-orange-500 rounded-full flex items-center justify-center text-xs font-bold">${coin.symbol[0]}</div>
                            <div>
                                <div class="font-semibold">${coin.name}</div>
                                <div class="text-xs text-zinc-400">${coin.symbol}</div>
                            </div>
                        </div>
                    </td>
                    <td class="py-5 px-8 text-right font-medium">\[ {coin.price.toFixed(2)}</td>
                    <td class="py-5 px-8 text-right ${coin.change >= 0 ? 'text-emerald-400' : 'text-red-400'}">
                        ${coin.change >= 0 ? '↑' : '↓'} ${Math.abs(coin.change).toFixed(2)}%
                    </td>
                    <td class="py-5 px-8 text-right font-medium"> \]{coin.cap}</td>
                    <td class="py-5 px-8">
                        <button onclick="setAlert('\( {coin.name}', ' \){coin.symbol}', ${coin.price})" 
                                class="text-xs bg-emerald-400/10 hover:bg-emerald-400 hover:text-black text-emerald-400 px-5 py-2 rounded-3xl">
                            <i class="fa-solid fa-bell"></i> Set Alert
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function filterTable() {
            const term = document.getElementById("search").value.toLowerCase();
            const filtered = coins.filter(c => 
                c.name.toLowerCase().includes(term) || c.symbol.toLowerCase().includes(term)
            );
            renderTable(filtered);
        }

        function refreshMock() {
            renderTable(coins);
            alert("✅ Demo refreshed! (Real data needs backend or paid API)");
        }

        function setAlert(name, symbol, price) {
            const target = prompt(`Set alert for \( {name} ( \){symbol})\nCurrent: \[ {price}\n\nTarget price:`, price);
            if (target) alert(`Alert saved for ${symbol} at \]{target}\n\n(Email alerts work if you add EmailJS later)`);
        }

        // Load demo immediately
        window.onload = () => renderTable(coins);
    </script>
</body>
</html>
